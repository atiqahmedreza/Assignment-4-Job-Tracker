<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <main class="max-w-5xl mx-auto p-6">

    <!-- Header -->
    <header>
      <h1 class="text-2xl font-bold text-gray-800 mb-6">
        Job Application Tracker
      </h1>
    </header>

    <!-- Dashboard -->
    <section class="grid md:grid-cols-3 gap-4 mb-8">

      <article class="bg-white p-4 rounded-lg shadow-sm">
        <p class="text-sm text-gray-500">Total</p>
        <h2 id="totalCount" class="text-2xl font-semibold">0</h2>
      </article>

      <article class="bg-white p-4 rounded-lg shadow-sm">
        <p class="text-sm text-gray-500">Interview</p>
        <h2 id="interviewCount" class="text-2xl font-semibold text-green-600">0</h2>
      </article>

      <article class="bg-white p-4 rounded-lg shadow-sm">
        <p class="text-sm text-gray-500">Rejected</p>
        <h2 id="rejectedCount" class="text-2xl font-semibold text-red-600">0</h2>
      </article>

    </section>

    <!-- Available Jobs Section -->
    <section class="bg-white rounded-lg shadow-sm p-6">

      <!-- Section Header -->
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-gray-700">
          Available Jobs
        </h2>
        <span id="tabCount" class="text-sm text-gray-500">
          0 Jobs
        </span>
      </div>

      <!-- Tabs -->
      <div class="flex gap-2 mb-6">
        <button data-tab="all"
          class="tab px-4 py-1 rounded-md text-sm bg-blue-600 text-white">
          All
        </button>

        <button data-tab="interview"
          class="tab px-4 py-1 rounded-md text-sm bg-gray-200 text-gray-700">
          Interview
        </button>

        <button data-tab="rejected"
          class="tab px-4 py-1 rounded-md text-sm bg-gray-200 text-gray-700">
          Rejected
        </button>
      </div>

      <!-- Jobs Container -->
      <div id="jobContainer" class="space-y-4"></div>

    </section>

  </main>

  <script src="./index.js"></script>

</body>
</html>
